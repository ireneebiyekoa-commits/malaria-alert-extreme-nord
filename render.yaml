# ============================================================
# Render.com — Déploiement automatique
# https://render.com/docs/blueprint-spec
# ============================================================
services:
  - type: web
    name: malaria-alert-extreme-nord
    runtime: python
    region: frankfurt          # Europe (Cameroun-friendly)
    plan: free
    pythonVersion: "3.12"
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --workers 2 --timeout 120 --bind 0.0.0.0:$PORT"
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: SECRET_KEY
        generateValue: true        # Render génère une clé secrète
      - key: DEBUG
        value: "False"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: ALLOWED_HOSTS
        value: ".onrender.com,.malaria-alert-extreme-nord.onrender.com"
      - key: GEMINI_API_KEY
        sync: false                # À renseigner manuellement dans Render (Secret)
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: WEB_CONCURRENCY
        value: "2"
